        .ink-bg {
            background: radial-gradient(circle at 50% 50%, rgba(26, 28, 29, 0.05) 0%, rgba(245, 245, 240, 1) 100%),
                        url('data:image/svg+xml;utf8,<svg opacity="0.05" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
            background-size: cover;
        }
        .tree-trunk::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
            width: 4px; background: linear-gradient(to bottom, transparent, #1a1c1d, #1a1c1d, transparent);
            transform: translateX(-50%); opacity: 0.3;
        }
        .node-fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .node-fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .branch-line {
            position: absolute;
            background: #1a1c1d;
            opacity: 0.2;
            transition: all 0.5s ease;
        }
        .branch-line:hover {
            opacity: 0.5;
            background: #c3272b;
        }
        .modal-backdrop {
            background: rgba(26, 28, 29, 0.95);
            backdrop-filter: blur(10px);
        }
        #gestureCanvas { 
            position: fixed; 
            bottom: 20px; 
            right: 20px;

            border-radius: 10px; 
            border: 2px solid #cd7f32; 
            z-index: 999;

        }
        .status-normal { background: #cd7f32; color: white; }
        .status-success { background: #22c55e; color: white; }
        .status-error { background: #ef4444; color: white; }
    </style>

    <script>
        // ==============================================
        // 1. 时间轴数据与渲染
        // ==============================================
        const timelineData = [
            { dynasty: "新石器时代", building: "河姆渡遗址", desc: "河姆渡干栏式建筑是中国最早的木构建筑遗存，距今约7000年。建筑以木桩为基础，上架地板、梁架、屋顶，整体悬空于地面，兼具防潮、防虫、防洪功能，完美适配江南水乡的潮湿环境，是中国南方传统民居的鼻祖，展现了新石器时代先民精湛的木作技艺。", modelPath: "./models/河姆渡.glb" },
            { dynasty: "夏代", building: "二里头遗址", desc: "二里头遗址是中国最早的王朝都城遗址，其宫殿建筑开创了中国古代四合院式宫殿的先河。主体宫殿坐北朝南，由门庭、庭院、主殿、廊庑组成完整的院落体系，布局严谨、中轴对称，奠定了中国古代皇家建筑三千余年的规划范式，是华夏早期文明的核心见证。", modelPath: "./models/二里头遗址.glb" },
            { dynasty: "商代", building: "殷墟宫殿", desc: "殷墟宫殿宗庙遗址是商代晚期都城核心，位于河南安阳，是中国历史上第一个有文献可考、并经考古发掘证实的都城遗址。建筑群分为宫殿、宗庙、祭坛三大区域，以夯土台基为核心，木骨泥墙为主体，重檐庑殿式屋顶，规模宏大，布局规整，展现了商代鼎盛时期的建筑技艺与王权礼制。", modelPath: "./models/殷墟宫殿.glb" },
            { dynasty: "西周", building: "镐京宫城", desc: "西周镐京宫城是周礼制度下的建筑典范，严格遵循《考工记》中'面朝后市、左祖右社'的都城规划理念。建筑以高台榭、美宫室为特征，夯土台基层层抬升，院落序列层层递进，建筑等级、开间、形制均与礼乐制度严格绑定，将建筑功能与王朝礼制深度融合，确立了中国古代建筑的礼制核心。", modelPath: "./models/镐京宫城.glb" },
            { dynasty: "西周", building: "西周宗庙建筑", desc: "西周宗庙建筑是西周王朝最高等级的礼制建筑，是祭祀祖先、举行重大典礼的核心场所，严格遵循周礼的昭穆制度布局。建筑以夯土高台为基，采用中轴对称的四合院形制，主体殿堂面阔多间，木构梁架与夯土墙结合，屋顶采用重檐形制，是西周宗法制度与礼乐文明的建筑载体，奠定了中国古代礼制建筑的核心范式。", modelPath: "./models/西周宗庙建筑.glb" },
            { dynasty: "春秋战国", building: "都城城防", desc: "春秋战国时期，诸侯争霸推动了城防建筑的飞速发展。都城城防体系由夯土城墙、护城河、马面、瓮城、角楼组成，形成多层级的防御体系。城墙高大厚重，护城河宽深兼备，城门设置瓮城形成'瓮中捉鳖'的防御格局，是中国古代军事建筑的重要里程碑，见证了春秋战国时期的战争与城市发展。", modelPath: "./models/春秋都城城防.glb" },
            { dynasty: "秦汉~明", building: "万里长城", desc: "万里长城是中国古代最伟大的军事防御工程，始建于春秋战国，秦统一后连成万里防线，历经汉、明等朝代修缮扩建，总长度超过2万公里。长城以城墙为主体，结合关隘、烽燧、城障、卫所形成完整的军事防御体系，因地制宜、就地取材，或夯土筑造，或砖石垒砌，或依山为险，跨越山河戈壁，是世界建筑史上的奇迹，也是中华民族的精神象征。", modelPath: "./models/一截长城.glb" },
            { dynasty: "隋代", building: "赵州桥", desc: "赵州桥（安济桥）由隋代工匠李春设计建造，是世界上现存最早、保存最完整的敞肩石拱桥，距今已有1400余年历史。桥长50.82米，主拱净跨37.02米，采用单孔敞肩形制，在主拱两端各设两个小拱，既减轻了桥身自重，又增加了泄洪能力，兼具力学科学性与建筑美感。历经多次地震、洪水仍屹立不倒，是中国古代桥梁建筑的巅峰之作。", modelPath: "./models/赵州桥.glb" },
            { dynasty: "唐代", building: "大雁塔", desc: "大雁塔位于西安大慈恩寺内，始建于唐代永徽三年，为保存玄奘法师从天竺取回的经像舍利而建，是唐代楼阁式砖塔的典范。塔高64.5米，共7层，采用方形锥体形制，由仿木结构的砖券形成开间、立柱、斗拱，外观庄重古朴、气势恢宏，内部有楼梯可登临塔顶。塔身历经千年风雨和多次修缮仍保存完好，是唐代佛教建筑的核心遗存，也是丝绸之路文化交流的重要见证。", modelPath: "./models/大雁塔.glb" },
            { dynasty: "北宋", building: "开封铁塔", desc: "开封铁塔始建于北宋皇祐元年，因通体采用褐色琉璃砖砌筑，颜色近似铁色而得名，是宋代琉璃砖塔的巅峰之作。塔高55.88米，共13层，采用八角形楼阁式形制，塔身琉璃砖上雕刻有佛像、飞天、麒麟、花卉等50余种图案，雕刻精美，工艺精湛。铁塔历经900余年风雨、地震、洪水甚至炮火轰击仍屹立不倒，被誉为'天下第一塔'，展现了宋代高超的砖石建筑与琉璃烧制技艺。", modelPath: "./models/开封铁塔.glb" },
            { dynasty: "辽代", building: "应县木塔", desc: "应县木塔（佛宫寺释迦塔）建于辽代清宁二年，是世界上现存最高、最古老的纯木结构楼阁式塔，距今近千年历史。塔高67.31米，共5层6檐，整体采用榫卯结构搭建，未使用一颗铁钉，由数万件木构件组合而成，形成双层套筒式结构，抗震性能极强。历经多次大地震、战乱仍完好保存，被誉为'木构建筑的奇迹'，是中国古代木构建筑技艺的最高代表。", modelPath: "./models/应县木塔.glb" },
            { dynasty: "元代", building: "妙应寺白塔", desc: "妙应寺白塔位于北京，始建于元代至元八年，由尼泊尔工匠阿尼哥设计建造，是中国现存最早、规模最大的藏传佛教覆钵式塔。塔高50.9米，由塔基、塔身、塔刹三部分组成，塔基为双层须弥座，塔身呈覆钵形，塔刹为十三天相轮，顶部冠以青铜鎏金塔盖与宝珠。整体造型庄重雄浑，融合了尼泊尔建筑技艺与中国传统建筑工艺，是元代中尼文化交流的见证，也是藏传佛教建筑的经典之作。", modelPath: "./models/妙应寺白塔.glb" },
            { dynasty: "明代", building: "紫禁城 明朝皇家宫殿", desc: "紫禁城（故宫）始建于明代永乐十八年，是明清两代的皇家宫殿，中国现存规模最大、保存最完整的古代宫殿建筑群，世界五大宫殿之首。建筑群占地72万平方米，严格遵循《周礼》'前朝后寝、左祖右社'的规制，分为外朝与内廷两大区域，外朝以太和殿、中和殿、保和殿三大殿为核心，是举行国家大典的场所；内廷以乾清宫、交泰殿、坤宁宫后三宫为主体，是帝后日常居所。整体布局中轴对称，等级森严，是中国古代宫殿建筑的集大成者，也是中华文明的核心物质载体。", modelPath: "./models/紫禁城 明朝皇家宫殿.glb" },
            { dynasty: "明代", building: "太和殿", desc: "太和殿俗称'金銮殿'，是北京故宫三大殿之首，始建于明代永乐十八年，是中国现存等级最高、规模最大的木构皇家建筑。太和殿面阔11间，进深5间，建筑面积2377平方米，采用重檐庑殿顶，上覆黄色琉璃瓦，屋脊走兽多达10个，为中国古建筑独一份。殿内金龙和玺彩画、蟠龙金柱、九龙金銮宝座，处处彰显皇家至尊等级，是中国古代皇家建筑的巅峰代表，也是明清两代王朝礼制的核心象征。", modelPath: "./models/故宫太和殿.glb" },
            { dynasty: "明代", building: "拙政园", desc: "拙政园位于苏州，始建于明代正德年间，是江南古典园林的代表作品，中国四大名园之一。园林占地78亩，以水为核心，水面占全园面积的三分之一，因地制宜，布局自然，分为东、中、西三部分。园内亭台楼阁临水而建，廊庑蜿蜒，山石错落，花木繁茂，一步一景，移步换景，将山水之美、建筑之巧、诗文之韵融为一体，完美诠释了'虽由人作，宛自天开'的中国古典园林造园理念，被誉为'天下园林之母'。", modelPath: "./models/苏州拙政园.glb" },
            { dynasty: "清代", building: "祈年殿", desc: "祈年殿是北京天坛的核心建筑，始建于明代永乐十八年，清光绪年间重建，是中国古代祭祀建筑的巅峰之作。殿高38.2米，直径32.72米，采用圆形三重檐攒尖顶，上覆蓝色琉璃瓦，象征天圆地方、青天在上。殿内由28根金丝楠木大柱支撑，中间4根龙井柱象征四季，中层12根金柱象征12个月，外层12根檐柱象征12时辰，将天文历法与建筑结构完美融合，造型庄重优美，是中国古代建筑艺术的经典符号。", modelPath: "./models/天坛祈年殿.glb" },
            { dynasty: "清代", building: "颐和园", desc: "颐和园坐落于北京西郊，始建于清代乾隆年间，原名清漪园，是中国现存规模最大、保存最完整的皇家园林，中国四大名园之一。园林占地290公顷，由昆明湖、万寿山为核心，分为宫廷区、前山前湖区、后山后湖区三大区域，集北方皇家园林的恢弘大气与江南水乡园林的婉约秀美于一体。园内佛香阁、长廊、石舫、十七孔桥等建筑各具特色，依山傍水，错落有致，被誉为'皇家园林博物馆'，是中国古典园林的集大成之作。", modelPath: "./models/颐和园.glb" }
        ];

        // 渲染时间轴
        const container = document.getElementById('timeline-container');
        timelineData.forEach((item, index) => {
            const isLeft = index % 2 === 0;
            const node = document.createElement('div');
            node.className = `node-fade-in relative flex items-center mb-16 ${isLeft ? 'flex-row' : 'flex-row-reverse'}`;
            node.innerHTML = `
                <div class="w-5/12 ${isLeft ? 'text-right pr-8' : 'text-left pl-8'}">
                    <div class="bg-white p-6 rounded-lg shadow-lg border-l-4 border-china-red hover:shadow-xl transition-shadow cursor-pointer" onclick="openModal(${index})">
                        <span class="text-sm text-china-red font-semibold tracking-wider">${item.dynasty}</span>
                        <h3 class="text-2xl font-bold mt-2 mb-3">${item.building}</h3>
                        <p class="text-gray-600 line-clamp-3">${item.desc}</p>
                    </div>
                </div>
                <div class="w-2/12 flex justify-center">
                    <div class="w-4 h-4 bg-china-red rounded-full border-4 border-rice-white shadow-lg z-10"></div>
                </div>
                <div class="w-5/12"></div>
            `;
            container.appendChild(node);
        });

        // 滚动动画
        const observer = new IntersectionObserver(e => e.forEach(i => i.isIntersecting && i.target.classList.add('visible')), { threshold: 0.2 });
        document.querySelectorAll('.node-fade-in').forEach(el => observer.observe(el));

        // ==============================================
        // 2. Three.js 3D核心
        // ==============================================
        let scene, camera, renderer, currentModel;
        let isModalOpen = false;

        function initThreeJS() {
            try {
                const c = document.getElementById('canvas-container');
                if (!c) return;
                
                if (renderer && c.contains(renderer.domElement)) {
                    c.removeChild(renderer.domElement);
                }

                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(45, c.clientWidth / c.clientHeight, 0.1, 5000);
                camera.position.set(0, 5, 15);
                
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(c.clientWidth, c.clientHeight);
                renderer.shadowMap.enabled = true;
                const rendererCanvas = renderer.domElement;
                rendererCanvas.style.position = 'absolute';
                rendererCanvas.style.top = '0';
                rendererCanvas.style.left = '0';
                rendererCanvas.style.width = '100%';
                rendererCanvas.style.height = '100%';
                rendererCanvas.style.zIndex = '999';
                rendererCanvas.style.pointerEvents = 'auto';
                rendererCanvas.style.cursor = 'grab';
                c.appendChild(rendererCanvas);
                
                // 鼠标和触摸事件
                let isDragging = false;
                let lastMouseX = 0;
                let lastMouseY = 0;
                let touchPoints = [];
                
                rendererCanvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    rendererCanvas.style.cursor = 'grabbing';
                });

                rendererCanvas.addEventListener('mousemove', (e) => {
                    if (!isDragging || !currentModel) return;
                    const deltaX = e.clientX - lastMouseX;
                    const deltaY = e.clientY - lastMouseY;
                    currentModel.rotation.y += deltaX * 0.01;
                    currentModel.rotation.x += deltaY * 0.01;
                    currentModel.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, currentModel.rotation.x));
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                });

                rendererCanvas.addEventListener('mouseup', () => {
                    isDragging = false;
                    rendererCanvas.style.cursor = 'grab';
                });

                rendererCanvas.addEventListener('mouseleave', () => {
                    isDragging = false;
                    rendererCanvas.style.cursor = 'grab';
                });

                rendererCanvas.addEventListener('wheel', (e) => {
                    if (!currentModel) return;
                    const scaleFactor = e.deltaY > 0 ? 0.95 : 1.05;
                    currentModel.scale.multiplyScalar(scaleFactor);
                    const minScale = 0.1, maxScale = 5;
                    currentModel.scale.clampScalar(minScale, maxScale);
                });

                rendererCanvas.addEventListener('touchstart', (e) => {
                    touchPoints = Array.from(e.touches).map(t => ({ clientX: t.clientX, clientY: t.clientY }));
                });

                rendererCanvas.addEventListener('touchmove', (e) => {
                    if (!currentModel || touchPoints.length === 0) return;
                    e.preventDefault();
                    const touches = Array.from(e.touches);
                    
                    if (touches.length === 1 && touchPoints.length === 1) {
                        const deltaX = touches[0].clientX - touchPoints[0].clientX;
                        const deltaY = touches[0].clientY - touchPoints[0].clientY;
                        currentModel.position.x += deltaX * 0.01;
                        currentModel.position.y -= deltaY * 0.01;
                    } else if (touches.length === 2 && touchPoints.length === 2) {
                        const d1 = Math.hypot(touches[1].clientX - touches[0].clientX, touches[1].clientY - touches[0].clientY);
                        const d0 = Math.hypot(touchPoints[1].clientX - touchPoints[0].clientX, touchPoints[1].clientY - touchPoints[0].clientY);
                        const scaleFactor = d1 / d0;
                        currentModel.scale.multiplyScalar(scaleFactor);
                        currentModel.scale.clampScalar(0.1, 5);
                    }
                    touchPoints = touches.map(t => ({ clientX: t.clientX, clientY: t.clientY }));
                });

                rendererCanvas.addEventListener('touchend', () => {
                    touchPoints = [];
                });

                scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 0.8));
                const light = new THREE.DirectionalLight(0xffffff, 1);
                light.position.set(50, 50, 50);
                light.castShadow = true;
                scene.add(light);
                
                animate();
            } catch (error) {
                console.error('Three.js初始化失败:', error);
            }
        }

        function animate() {
            if (!isModalOpen) return;
            requestAnimationFrame(animate);
            if (currentModel) {
                currentModel.rotation.y += 0.005;
            }
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        function loadModel(path) {
            const loadingText = document.getElementById('loading-text');
            loadingText.style.display = 'flex';
            loadingText.innerText = '模型加载中...';
            if(currentModel) scene.remove(currentModel);

            try {
                if (typeof THREE.GLTFLoader === 'undefined') {
                    throw new Error('THREE.GLTFLoader未加载');
                }
                
                const loader = new THREE.GLTFLoader();
                loader.load(
                    path,
                    (gltf) => {
                        currentModel = gltf.scene;
                        scene.add(currentModel);
                        currentModel.position.set(0, 0, 0);
                        const box = new THREE.Box3().setFromObject(currentModel);
                        const size = box.getSize(new THREE.Vector3());
                        const maxSize = Math.max(size.x, size.y, size.z);
                        const scale = 10 / maxSize;
                        currentModel.scale.setScalar(scale);
                        loadingText.style.display = 'none';
                    },
                    (xhr) => {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loadingText.innerText = `模型加载中... ${percent}%`;
                    },
                    (error) => {
                        console.error('模型加载失败:', error);
                        loadingText.innerText = '模型加载失败，显示替代模型';
                        const geometry = new THREE.BoxGeometry(5, 5, 5);
                        const material = new THREE.MeshStandardMaterial({ color: 0xcd7f32 });
                        currentModel = new THREE.Mesh(geometry, material);
                        scene.add(currentModel);
                        setTimeout(() => loadingText.style.display = 'none', 1000);
                    }
                );
            } catch (error) {
                console.error('加载模型时出错:', error);
                loadingText.innerText = '加载模型时出错';
                const geometry = new THREE.BoxGeometry(5, 5, 5);
                const material = new THREE.MeshStandardMaterial({ color: 0xcd7f32 });
                currentModel = new THREE.Mesh(geometry, material);
                scene.add(currentModel);
                setTimeout(() => loadingText.style.display = 'none', 1000);
            }
        }

        // ==============================================
        // 3. 摄像头核心 - MediaPipe Hands
        // ==============================================
        const video = document.createElement('video');
        const canvas = document.getElementById('gestureCanvas');
        const ctx = canvas.getContext('2d');
        const statusTip = document.getElementById('camera-status');
        const gestureStatusTip = document.getElementById('gesture-status');
        let isCameraRunning = false;
        let hands = null;
        let cameraUtils = null;
        
        // 上一帧手部数据
        let lastHandData = null;

        async function startCamera() {
            if(isCameraRunning) return;

            try {
                statusTip.style.display = 'block';
                statusTip.innerText = '正在请求摄像头权限...';
                statusTip.className = 'status-normal';
                
                // 初始化MediaPipe Hands
                hands = new Hands({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});
                
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                hands.onResults(onHandsResults);
                
                // 启动摄像头
                cameraUtils = new Camera(video, {
                    onFrame: async () => {
                        await hands.send({image: video});
                    },
                    width: 640,
                    height: 480
                });
                
                await cameraUtils.start();
                
                isCameraRunning = true;
                canvas.style.display = 'block';
                statusTip.innerText = '摄像头已开启';
                statusTip.className = 'status-success';
                gestureStatusTip.innerText = '✅ 手势控制已激活';
                setTimeout(() => statusTip.style.display = 'none', 3000);

            } catch (err) {
                console.error('摄像头启动失败', err);
                isCameraRunning = false;
                if(err.name === 'NotAllowedError') {
                    statusTip.innerText = '摄像头权限被禁止，请在浏览器地址栏右侧放行';
                } else if(err.name === 'NotFoundError') {
                    statusTip.innerText = '未检测到摄像头';
                } else {
                    statusTip.innerText = '摄像头启动失败：' + err.message;
                }
                statusTip.className = 'status-error';
                gestureStatusTip.innerText = '❌ 摄像头未启动';
            }
        }

        function onHandsResults(results) {
            if (!isModalOpen || !currentModel) return;
            
            // 清空画布
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // 绘制手部关键点
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                    drawLandmarks(ctx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 3});
                }
                
                // 获取第一只手的数据
                const hand = results.multiHandLandmarks[0];
                const wrist = hand[0]; // 手腕
                const middleFingerTip = hand[12]; // 中指指尖
                
                // 计算手部中心点
                const handX = (wrist.x + middleFingerTip.x) / 2;
                const handY = (wrist.y + middleFingerTip.y) / 2;
                
                // 计算手部大小（手腕到中指指尖的距离）
                const handSize = Math.hypot(middleFingerTip.x - wrist.x, middleFingerTip.y - wrist.y);
                
                // 如果有上一帧数据，计算变化
                if (lastHandData) {
                    const deltaX = handX - lastHandData.x;
                    const deltaY = handY - lastHandData.y;
                    const sizeChange = handSize - lastHandData.size;
                    
                    // 根据手部位置变化控制模型旋转
                    if (Math.abs(deltaX) > 0.01 || Math.abs(deltaY) > 0.01) {
                        currentModel.rotation.y += deltaX * 2;
                        currentModel.rotation.x += deltaY * 2;
                        currentModel.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, currentModel.rotation.x));
                    }
                    
                    // 根据手部大小变化控制模型缩放
                    if (Math.abs(sizeChange) > 0.05) {
                        const scaleFactor = sizeChange > 0 ? 1.05 : 0.95;
                        currentModel.scale.multiplyScalar(scaleFactor);
                        currentModel.scale.clampScalar(0.1, 5);
                    }
                }
                
                // 更新上一帧数据
                lastHandData = { x: handX, y: handY, size: handSize };
                
                // 绘制手部中心点
                const canvasX = handX * canvas.width;
                const canvasY = handY * canvas.height;
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 10, 0, 2 * Math.PI);
                ctx.fillStyle = 'blue';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
            } else {
                lastHandData = null;
            }
            
            ctx.restore();
        }

        function stopCamera() {
            if(!isCameraRunning) return;
            if(cameraUtils) {
                cameraUtils.stop();
            }
            isCameraRunning = false;
            canvas.style.display = 'none';
            gestureStatusTip.innerText = '❌ 摄像头未启动';
            lastHandData = null;
        }

        // ==============================================
        // 4. 弹窗控制
        // ==============================================
        window.openModal = (index) => {
            const data = timelineData[index];
            document.getElementById('modal-dynasty').innerText = data.dynasty;
            document.getElementById('modal-title').innerText = data.building;
            document.getElementById('modal-desc').innerText = data.desc;
            
            const modal = document.getElementById('model-modal');
            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.add('opacity-100');
            isModalOpen = true;

            initThreeJS();
            loadModel(data.modelPath);
            if(!isCameraRunning) startCamera();
        };

        window.closeModal = () => {
            const modal = document.getElementById('model-modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                isModalOpen = false;
            }, 500);
        };

        // 测试模型加载
        function testModelLoad() {
            initThreeJS();
            loadModel('./models/河姆渡.glb');
        }

        // 页面加载初始化
        window.addEventListener('load', () => {
            // 手势操控教学模态框
            const gestureHelpModal = document.getElementById('gesture-help-modal');
            const closeGestureHelp = document.getElementById('close-gesture-help');
            const gestureHelpBtn = document.getElementById('gesture-help-btn');
            
            const hasSeenGestureHelp = localStorage.getItem('hasSeenGestureHelp');
            if (!hasSeenGestureHelp) {
                gestureHelpModal.style.display = 'flex';
                localStorage.setItem('hasSeenGestureHelp', 'true');
            } else {
                gestureHelpModal.style.display = 'none';
            }
            
            closeGestureHelp.addEventListener('click', () => {
                gestureHelpModal.style.display = 'none';
            });
            
            gestureHelpBtn.addEventListener('click', () => {
                gestureHelpModal.style.display = 'flex';
            });
        });
    </script>
</body>
</html>
